version: '3.8'

services:
  # =========================================================================
  # Neo4j Database
  # =========================================================================
  neo4j:
    image: neo4j:5-community
    container_name: graph-query-neo4j
    ports:
      - "7687:7687"      # Bolt protocol
      - "7474:7474"      # HTTP
      - "7473:7473"      # HTTPS
    environment:
      # Neo4j configuration
      NEO4J_AUTH: neo4j/password123
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      
      # Performance tuning
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1024m
      
      # Logging
      NEO4J_dbms_logs_query_enabled: "false"  # Disable query logging for performance
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graph-network
  
  # =========================================================================
  # Backend API
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graph-query-backend
    ports:
      - "8000:8000"
    environment:
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      
      # LLM Provider
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # Auto-seed demo graph from CSVs (mounts ./backend/data -> /app/data)
      AUTO_LOAD_SAMPLE_DATA: "true"

      # SAP dataset auto-loader mount path (see backend/app/load_sample_data.py)
      SAP_DATA_DIR: /app/sap-order-to-cash-dataset
      
      # Application
      DEBUG_MODE: "false"
      LOG_LEVEL: "info"
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data  # Mount dataset
      - ./sap-order-to-cash-dataset:/app/sap-order-to-cash-dataset
    command: >
      sh -c "pip install -r requirements.txt && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graph-network
  
  # =========================================================================
  # Frontend Web UI
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graph-query-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevent host node_modules from overriding
    command: npm run dev
    networks:
      - graph-network

# =========================================================================
# Networks
# =========================================================================
networks:
  graph-network:
    driver: bridge

# =========================================================================
# Volumes
# =========================================================================
volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
